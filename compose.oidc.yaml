services:
  app:
    environment:
      STUFF_STASH_AUTH_MODE: ${STUFF_STASH_AUTH_MODE:-oidc}
      STUFF_STASH_INVITATION_PUBLIC_BASE_URL: ${STUFF_STASH_INVITATION_PUBLIC_BASE_URL:-http://localhost:5173/invitations/accept}
      STUFF_STASH_INVITATION_ALLOW_INSECURE_LOCAL_HTTP: ${STUFF_STASH_INVITATION_ALLOW_INSECURE_LOCAL_HTTP:-true}
      STUFF_STASH_AUTHZ_MODE: ${STUFF_STASH_AUTHZ_MODE:-spicedb}
      STUFF_STASH_CORS_ALLOWED_ORIGINS: ${STUFF_STASH_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      STUFF_STASH_SPICEDB_TLS_ENABLED: ${STUFF_STASH_SPICEDB_TLS_ENABLED:-false}
      STUFF_STASH_SPICEDB_BOOTSTRAP_SCHEMA: ${STUFF_STASH_SPICEDB_BOOTSTRAP_SCHEMA:-true}
      STUFF_STASH_SPICEDB_SCHEMA_PATH: ${STUFF_STASH_SPICEDB_SCHEMA_PATH:-/deploy/spicedb/schema.zed}
      STUFF_STASH_OIDC_ISSUER: ${STUFF_STASH_OIDC_ISSUER:-http://dex:5556/dex}
      STUFF_STASH_OIDC_CLIENT_ID: ${STUFF_STASH_OIDC_CLIENT_ID:-stuff-stash-local}
      STUFF_STASH_OIDC_CLIENT_IDS: ${STUFF_STASH_OIDC_CLIENT_IDS:-stuff-stash-local,stuff-stash-web-local,stuff-stash-mobile-local}
      STUFF_STASH_OIDC_MOBILE_CLIENT_ID: ${STUFF_STASH_OIDC_MOBILE_CLIENT_ID:-stuff-stash-mobile-local}
      STUFF_STASH_OIDC_MOBILE_REDIRECT_URI: ${STUFF_STASH_OIDC_MOBILE_REDIRECT_URI:-stuffstash://auth/callback}
      STUFF_STASH_OIDC_MOBILE_SCOPES: ${STUFF_STASH_OIDC_MOBILE_SCOPES:-openid,email,profile,offline_access}
    depends_on:
      dex:
        condition: service_started

  dex:
    image: dexidp/dex:v2.44.0@sha256:5d0656fce7d453c0e3b2706abf40c0d0ce5b371fb0b73b3cf714d05f35fa5f86
    command:
      - dex
      - serve
      - /etc/dex/config.yaml
    ports:
      - "${DEX_HTTP_PORT:-5556}:5556"
    volumes:
      - ${DEX_CONFIG_PATH:-./deploy/local/dex/config.yaml}:/etc/dex/config.yaml:ro
      - ./deploy/dex/theme/styles.css:/srv/dex/web/themes/light/styles.css:ro
      - ./docs/public/brand/stuff-stash-glyph.png:/srv/dex/web/themes/light/logo.png:ro
      - ./docs/public/brand/stuff-stash-glyph.png:/srv/dex/web/themes/light/favicon.png:ro
      - ./deploy/dex/templates/header.html:/srv/dex/web/templates/header.html:ro
      - ./deploy/dex/templates/login.html:/srv/dex/web/templates/login.html:ro
      - ./deploy/dex/templates/password.html:/srv/dex/web/templates/password.html:ro
