services:
  app:
    depends_on:
      dex:
        condition: service_started

  dex:
    image: dexidp/dex:v2.44.0@sha256:5d0656fce7d453c0e3b2706abf40c0d0ce5b371fb0b73b3cf714d05f35fa5f86
    command:
      - dex
      - serve
      - /etc/dex/config.yaml
    ports:
      - "${DEX_HTTP_PORT:-5556}:5556"
    volumes:
      - ./deploy/local/dex/config.yaml:/etc/dex/config.yaml:ro
