{{ template "header.html" . }}

<div class="theme-panel">
  <h1 class="theme-heading">Enter device code</h1>
  <form method="post" action="{{ .PostURL }}">
    <div class="theme-form-row">
      <div class="theme-form-label">
        <label for="user_code">Device code</label>
      </div>
      {{ if .UserCode }}
        <input required id="user_code" name="user_code" type="text" class="theme-form-input" autocomplete="one-time-code" value="{{ .UserCode }}" {{ if .Invalid }} autofocus aria-describedby="login-error" aria-invalid="true"{{ end }}/>
      {{ else }}
        <input required id="user_code" name="user_code" type="text" class="theme-form-input" placeholder="XXXX-XXXX" autocomplete="one-time-code" autofocus {{ if .Invalid }}aria-describedby="login-error" aria-invalid="true"{{ end }}/>
      {{ end }}
    </div>

    {{ if .Invalid }}
      <div id="login-error" class="dex-error-box" role="alert">That code is invalid or expired. Check the code and try again.</div>
    {{ end }}
    <button id="submit-login" type="submit" class="dex-btn theme-btn--primary">Continue</button>
  </form>
</div>

{{ template "footer.html" . }}
