{{ template "header.html" . }}

<div class="theme-panel">
  <h1 class="theme-heading">Sign in to {{ issuer }}</h1>
  <div class="theme-provider-list">
    {{ range $c := .Connectors }}
      <a class="dex-btn theme-btn-provider" href="{{ $c.URL }}">
        <span class="dex-btn-icon dex-btn-icon--{{ $c.Type }}"></span>
        <span class="dex-btn-text">Continue with {{ $c.Name }}</span>
      </a>
    {{ end }}
  </div>
</div>

{{ template "footer.html" . }}
