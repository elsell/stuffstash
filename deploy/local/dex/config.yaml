# Local verification fixture only.
# Do not use this static client, static users, or password grant in production.

issuer: http://dex:5556/dex

storage:
  type: memory

frontend:
  dir: /srv/dex/web
  issuer: Stuff Stash
  theme: light

web:
  http: 0.0.0.0:5556
  allowedOrigins:
    - http://localhost:5173

oauth2:
  passwordConnector: local
  skipApprovalScreen: true

staticClients:
  - id: stuff-stash-local
    name: Stuff Stash Local
    secret: stuff-stash-local-secret
    redirectURIs:
      - http://localhost:8080/callback
      - http://localhost:5173/callback
  - id: stuff-stash-web-local
    name: Stuff Stash Web Local
    public: true
    redirectURIs:
      - http://localhost:5173/callback
  - id: stuff-stash-mobile-local
    name: Stuff Stash Mobile Local
    public: true
    redirectURIs:
      - stuffstash://auth/callback
  - id: stuff-stash-wrong-audience
    name: Stuff Stash Wrong Audience Fixture
    secret: stuff-stash-wrong-audience-secret
    redirectURIs:
      - http://localhost:8080/callback

enablePasswordDB: true

