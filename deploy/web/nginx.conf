index index.html;
server_tokens off;

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' '__STUFFSTASH_BOOTSTRAP_SCRIPT_HASH__'; connect-src 'self' https://api.stuffstash.jsksell.com https://stuffstash.jsksell.com; form-action 'self' https://stuffstash.jsksell.com" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;

location = /config.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
}

location /_app/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ /index.html;
}
