index index.html;
server_tokens off;

add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob: __STUFFSTASH_CSP_IMG_SRC__; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' '__STUFFSTASH_BOOTSTRAP_SCRIPT_HASH__'; connect-src 'self' __STUFFSTASH_CSP_CONNECT_SRC__; form-action 'self' __STUFFSTASH_CSP_FORM_ACTION__" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;

location = /config.json {
    add_header Cache-Control "no-store" always;
    alias /tmp/stuffstash-config.json;
}

location = /.well-known/apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600" always;
    alias /tmp/apple-app-site-association;
}

location = /.well-known/assetlinks.json {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600" always;
    alias /tmp/assetlinks.json;
}

location /_app/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ /index.html;
}
