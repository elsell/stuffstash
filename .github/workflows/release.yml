name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.8"
  NODE_VERSION: "24.17.0"
  PNPM_VERSION: "11.0.7"

jobs:
  validate:
    name: Validate release inputs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_required: ${{ steps.plan.outputs.release_required }}
      previous_tag: ${{ steps.plan.outputs.previous_tag }}
      next_version: ${{ steps.plan.outputs.next_version }}
      next_tag: ${{ steps.plan.outputs.next_tag }}
      bump: ${{ steps.plan.outputs.bump }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Plan release
        id: plan
        run: scripts/plan-release.sh --github-output

      - name: Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Run required checks
        run: make required-checks
        env:
          STUFF_STASH_STRUCTURAL_BASE: ${{ github.event.before }}

      - name: Report no release
        if: steps.plan.outputs.release_required != 'true'
        run: echo "No release-worthy Conventional Commits since ${{ steps.plan.outputs.previous_tag }}."

  publish:
    name: Publish release images and attestations
    needs: validate
    if: needs.validate.outputs.release_required == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions: write
      packages: write
      pull-requests: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Refuse existing release tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ needs.validate.outputs.next_tag }}" >/dev/null; then
            echo "Release tag ${{ needs.validate.outputs.next_tag }} already exists." >&2
            exit 1
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build and push API image by commit
        id: api_image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/stuffstash"
          sha_tag="sha-${GITHUB_SHA}"

          docker buildx build \
            --push \
            --provenance=mode=max \
            --sbom=true \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${{ needs.validate.outputs.next_tag }}" \
            --tag "${image}:${sha_tag}" \
            --metadata-file api-image-metadata.json \
            .

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("api-image-metadata.json", encoding="utf-8") as handle:
              metadata = json.load(handle)
          digest = metadata.get("containerimage.digest")
          if not digest:
              digest = metadata.get("containerimage.descriptor", {}).get("digest")
          if not digest:
              raise SystemExit("buildx metadata did not include container image digest")
          print(f"digest={digest}")
          PY

          printf 'image=%s\n' "${image}" >> "$GITHUB_OUTPUT"
          printf 'image_ref=%s@%s\n' "${image}" "$(python3 -c 'import json; m=json.load(open("api-image-metadata.json")); print(m.get("containerimage.digest") or m.get("containerimage.descriptor", {}).get("digest"))')" >> "$GITHUB_OUTPUT"

      - name: Build and push web image by commit
        id: web_image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/stuffstash-web"
          sha_tag="sha-${GITHUB_SHA}"

          docker buildx build \
            --file Dockerfile.web \
            --push \
            --provenance=mode=max \
            --sbom=true \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${{ needs.validate.outputs.next_tag }}" \
            --tag "${image}:${sha_tag}" \
            --metadata-file web-image-metadata.json \
            .

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("web-image-metadata.json", encoding="utf-8") as handle:
              metadata = json.load(handle)
          digest = metadata.get("containerimage.digest")
          if not digest:
              digest = metadata.get("containerimage.descriptor", {}).get("digest")
          if not digest:
              raise SystemExit("buildx metadata did not include container image digest")
          print(f"digest={digest}")
          PY

          printf 'image=%s\n' "${image}" >> "$GITHUB_OUTPUT"
          printf 'image_ref=%s@%s\n' "${image}" "$(python3 -c 'import json; m=json.load(open("web-image-metadata.json")); print(m.get("containerimage.digest") or m.get("containerimage.descriptor", {}).get("digest"))')" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - name: Sign images
        run: |
          scripts/sign-release-images.sh \
            "${{ steps.api_image.outputs.image_ref }}" \
            "${{ steps.web_image.outputs.image_ref }}"

      - name: Verify image signatures
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.api_image.outputs.image_ref }}"
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.web_image.outputs.image_ref }}"

      - name: Attest API image provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ steps.api_image.outputs.image }}
          subject-digest: ${{ steps.api_image.outputs.digest }}
          push-to-registry: true

      - name: Attest web image provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ steps.web_image.outputs.image }}
          subject-digest: ${{ steps.web_image.outputs.digest }}
          push-to-registry: true

      - name: Update self-host image digests
        run: |
          node scripts/update-selfhost-image-refs.mjs \
            --api-image "${{ steps.api_image.outputs.image_ref }}" \
            --web-image "${{ steps.web_image.outputs.image_ref }}"

      - name: Open self-host image digest update PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .env.example
          if git diff --cached --quiet; then
            echo "Self-host image digests are already current."
            exit 0
          fi
          digest_branch="release/self-host-images-${{ needs.validate.outputs.next_tag }}"
          git commit -m "chore(release): update self-host image digests for ${{ needs.validate.outputs.next_tag }}"
          if git ls-remote --exit-code --heads origin "$digest_branch" >/dev/null; then
            git fetch origin "refs/heads/$digest_branch:refs/remotes/origin/$digest_branch"
            git push --force-with-lease=refs/heads/"$digest_branch" origin HEAD:"$digest_branch"
          else
            git push origin HEAD:"$digest_branch"
          fi

          {
            printf '%s\n\n' "Updates \`.env.example\` to the image digests published for \`${{ needs.validate.outputs.next_tag }}\`."
            printf '%s\n' "- API image: \`${{ steps.api_image.outputs.image_ref }}\`"
            printf '%s\n' "- Web image: \`${{ steps.web_image.outputs.image_ref }}\`"
          } > digest-pr-body.md

          existing_pr="$(gh pr list --head "$digest_branch" --base main --state open --json number --jq '.[0].number // ""')"
          if [ -n "$existing_pr" ]; then
            pr_number="$existing_pr"
            gh pr edit "$existing_pr" \
              --title "chore(release): update self-host image digests for ${{ needs.validate.outputs.next_tag }}" \
              --body-file digest-pr-body.md
          else
            gh pr create \
              --base main \
              --head "$digest_branch" \
              --title "chore(release): update self-host image digests for ${{ needs.validate.outputs.next_tag }}" \
              --body-file digest-pr-body.md
            pr_number="$(gh pr list --head "$digest_branch" --base main --state open --json number --jq '.[0].number // ""')"
            if [ -z "$pr_number" ]; then
              echo "Could not find digest update PR for $digest_branch." >&2
              exit 1
            fi
          fi

          checks_reported=false
          for _ in $(seq 1 60); do
            set +e
            checks_output="$(gh pr checks "$pr_number" --required 2>&1)"
            checks_status=$?
            set -e

            if printf '%s\n' "$checks_output" | grep -Fq "no checks reported"; then
              sleep 5
              continue
            fi

            if [ "$checks_status" -eq 0 ] || [ "$checks_status" -eq 8 ]; then
              checks_reported=true
              break
            fi

            printf '%s\n' "$checks_output" >&2
            exit "$checks_status"
          done

          if [ "$checks_reported" != "true" ]; then
            echo "Required checks were not reported for digest update PR #$pr_number." >&2
            exit 1
          fi

          gh pr checks "$pr_number" --required --watch --fail-fast --interval 10
          gh pr merge "$pr_number" --squash --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.validate.outputs.next_tag }}" "${GITHUB_SHA}"
          git push origin "${{ needs.validate.outputs.next_tag }}"

      - name: Create GitHub release
        run: |
          release_ref="${GITHUB_SHA}"
          previous="${{ needs.validate.outputs.previous_tag }}"
          if [ "$previous" = "none" ]; then
            range="$release_ref"
          else
            range="${previous}..${release_ref}"
          fi

          {
            printf 'API image: `%s`\n\n' "${{ steps.api_image.outputs.image_ref }}"
            printf 'API digest: `%s`\n\n' "${{ steps.api_image.outputs.digest }}"
            printf 'Web image: `%s`\n\n' "${{ steps.web_image.outputs.image_ref }}"
            printf 'Web digest: `%s`\n\n' "${{ steps.web_image.outputs.digest }}"
            printf 'Changes:\n'
            git log --format='- %s (%h)' "$range"
          } > release-notes.md

          gh release create "${{ needs.validate.outputs.next_tag }}" \
            --target "$release_ref" \
            --title "${{ needs.validate.outputs.next_tag }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
