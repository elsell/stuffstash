name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.8"
  NODE_VERSION: "24.17.0"
  PNPM_VERSION: "11.0.7"

jobs:
  release:
    name: Plan, build, attest, and release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Plan release
        id: plan
        run: scripts/plan-release.sh --github-output

      - name: Report no release
        if: steps.plan.outputs.release_required != 'true'
        run: echo "No release-worthy Conventional Commits since ${{ steps.plan.outputs.previous_tag }}."

      - name: Setup Go
        if: steps.plan.outputs.release_required == 'true'
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node
        if: steps.plan.outputs.release_required == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable pinned pnpm
        if: steps.plan.outputs.release_required == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@${PNPM_VERSION} --activate

      - name: Check dependency age
        if: steps.plan.outputs.release_required == 'true'
        run: make dependency-age-check

      - name: Test release scripts
        if: steps.plan.outputs.release_required == 'true'
        run: make scripts-test

      - name: Test API
        if: steps.plan.outputs.release_required == 'true'
        run: make test

      - name: Install web dependencies
        if: steps.plan.outputs.release_required == 'true'
        run: make web-install

      - name: Test web and API client
        if: steps.plan.outputs.release_required == 'true'
        run: make web-test web-check api-client-test api-client-check

      - name: Setup Docker Buildx
        if: steps.plan.outputs.release_required == 'true'
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Log in to GHCR
        if: steps.plan.outputs.release_required == 'true'
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build and push image
        if: steps.plan.outputs.release_required == 'true'
        id: image
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/stuffstash"
          tag="${{ steps.plan.outputs.next_tag }}"
          sha_tag="sha-${GITHUB_SHA}"

          docker buildx build \
            --push \
            --provenance=mode=max \
            --sbom=true \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${tag}" \
            --tag "${image}:${tag}" \
            --tag "${image}:${sha_tag}" \
            --metadata-file image-metadata.json \
            .

          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json

          with open("image-metadata.json", encoding="utf-8") as handle:
              metadata = json.load(handle)
          digest = metadata.get("containerimage.digest")
          if not digest:
              digest = metadata.get("containerimage.descriptor", {}).get("digest")
          if not digest:
              raise SystemExit("buildx metadata did not include container image digest")
          print(f"digest={digest}")
          PY

          printf 'image=%s\n' "${image}" >> "$GITHUB_OUTPUT"
          printf 'image_ref=%s@%s\n' "${image}" "$(python3 -c 'import json; m=json.load(open("image-metadata.json")); print(m.get("containerimage.digest") or m.get("containerimage.descriptor", {}).get("digest"))')" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.plan.outputs.release_required == 'true'
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22

      - name: Sign image
        if: steps.plan.outputs.release_required == 'true'
        run: cosign sign --yes "${{ steps.image.outputs.image_ref }}"

      - name: Verify image signature
        if: steps.plan.outputs.release_required == 'true'
        run: |
          cosign verify \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.image.outputs.image_ref }}"

      - name: Attest image provenance
        if: steps.plan.outputs.release_required == 'true'
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Create release tag
        if: steps.plan.outputs.release_required == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.plan.outputs.next_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.plan.outputs.next_tag }}"

      - name: Create GitHub release
        if: steps.plan.outputs.release_required == 'true'
        run: |
          previous="${{ steps.plan.outputs.previous_tag }}"
          if [ "$previous" = "none" ]; then
            range="${GITHUB_SHA}"
          else
            range="${previous}..${GITHUB_SHA}"
          fi

          {
            printf 'Container image: `%s`\n\n' "${{ steps.image.outputs.image_ref }}"
            printf 'Digest: `%s`\n\n' "${{ steps.image.outputs.digest }}"
            printf 'Changes:\n'
            git log --format='- %s (%h)' "$range"
          } > release-notes.md

          gh release create "${{ steps.plan.outputs.next_tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.plan.outputs.next_tag }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
