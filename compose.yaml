services:
  migration:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-registry.access.redhat.com/hi/go:1.25.10-builder-1780418048@sha256:1a99d42f555db97455998945faf3c797c1f65ce1b92e4d9952a589446d114d6c}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-registry.access.redhat.com/hi/core-runtime:2.42-1781714135@sha256:82ab1238082f405e19e1cc6e4950549371b6742ba6b649ca356c058249162540}
    image: stuff-stash:local
    command:
      - migrate
      - up
    environment:
      STUFF_STASH_DATABASE_DSN: ${STUFF_STASH_DATABASE_DSN:-postgres://stuffstash:stuffstash-local@postgres:5432/stuffstash?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-registry.access.redhat.com/hi/go:1.25.10-builder-1780418048@sha256:1a99d42f555db97455998945faf3c797c1f65ce1b92e4d9952a589446d114d6c}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-registry.access.redhat.com/hi/core-runtime:2.42-1781714135@sha256:82ab1238082f405e19e1cc6e4950549371b6742ba6b649ca356c058249162540}
    image: stuff-stash:local
    environment:
      STUFF_STASH_HTTP_ADDR: ${STUFF_STASH_HTTP_ADDR:-:8080}
      STUFF_STASH_CORS_ALLOWED_ORIGINS: ${STUFF_STASH_CORS_ALLOWED_ORIGINS:-}
      STUFF_STASH_AUTH_MODE: ${STUFF_STASH_AUTH_MODE:-local-dev}
      STUFF_STASH_INVITATION_PUBLIC_BASE_URL: ${STUFF_STASH_INVITATION_PUBLIC_BASE_URL:-http://localhost:5173/invitations/accept}
      STUFF_STASH_INVITATION_ALLOW_INSECURE_LOCAL_HTTP: ${STUFF_STASH_INVITATION_ALLOW_INSECURE_LOCAL_HTTP:-true}
      STUFF_STASH_AUTHZ_MODE: ${STUFF_STASH_AUTHZ_MODE:-memory}
      STUFF_STASH_OIDC_ISSUER: ${STUFF_STASH_OIDC_ISSUER:-https://accounts.google.com}
      STUFF_STASH_OIDC_CLIENT_ID: ${STUFF_STASH_OIDC_CLIENT_ID:-}
      STUFF_STASH_OIDC_CLIENT_IDS: ${STUFF_STASH_OIDC_CLIENT_IDS:-}
      STUFF_STASH_REPOSITORY_MODE: ${STUFF_STASH_REPOSITORY_MODE:-postgres}
      STUFF_STASH_DATABASE_DSN: ${STUFF_STASH_DATABASE_DSN:-postgres://stuffstash:stuffstash-local@postgres:5432/stuffstash?sslmode=disable}
      STUFF_STASH_SPICEDB_ENDPOINT: ${STUFF_STASH_SPICEDB_ENDPOINT:-spicedb:50051}
      STUFF_STASH_SPICEDB_PRESHARED_KEY: ${STUFF_STASH_SPICEDB_PRESHARED_KEY:-}
      STUFF_STASH_PROVIDER_CREDENTIAL_KEY: ${STUFF_STASH_PROVIDER_CREDENTIAL_KEY:-Ul7K2iGYjLE8gHG/rcJZ4NgEfo4OBwshgMi2NHq7PRI=}
      STUFF_STASH_PROVIDER_CREDENTIAL_KEY_ID: ${STUFF_STASH_PROVIDER_CREDENTIAL_ID:-changeme}
      STUFF_STASH_SPICEDB_TLS_ENABLED: ${STUFF_STASH_SPICEDB_TLS_ENABLED:-false}
      STUFF_STASH_SPICEDB_BOOTSTRAP_SCHEMA: ${STUFF_STASH_SPICEDB_BOOTSTRAP_SCHEMA:-false}
      STUFF_STASH_SPICEDB_SCHEMA_PATH: ${STUFF_STASH_SPICEDB_SCHEMA_PATH:-deploy/spicedb/schema.zed}
      STUFF_STASH_AUTHORIZATION_OUTBOX_DRAIN_LIMIT: ${STUFF_STASH_AUTHORIZATION_OUTBOX_DRAIN_LIMIT:-25}
      STUFF_STASH_AUTHORIZATION_OUTBOX_DRAIN_INTERVAL: ${STUFF_STASH_AUTHORIZATION_OUTBOX_DRAIN_INTERVAL:-10s}
      STUFF_STASH_AUTHORIZATION_OUTBOX_CLAIM_LEASE: ${STUFF_STASH_AUTHORIZATION_OUTBOX_CLAIM_LEASE:-30s}
      STUFF_STASH_DEFAULT_PAGE_LIMIT: ${STUFF_STASH_DEFAULT_PAGE_LIMIT:-50}
      STUFF_STASH_MAX_PAGE_LIMIT: ${STUFF_STASH_MAX_PAGE_LIMIT:-100}
      STUFF_STASH_BLOB_STORAGE_MODE: ${STUFF_STASH_BLOB_STORAGE_MODE:-s3}
      STUFF_STASH_BLOB_STORAGE_PATH: ${STUFF_STASH_BLOB_STORAGE_PATH:-/tmp/stuffstash/blobs}
      STUFF_STASH_S3_ENDPOINT: ${STUFF_STASH_S3_ENDPOINT:-garage:3900}
      STUFF_STASH_S3_PUBLIC_ENDPOINT: ${STUFF_STASH_S3_PUBLIC_ENDPOINT:-localhost:3900}
      STUFF_STASH_S3_ACCESS_KEY: ${STUFF_STASH_S3_ACCESS_KEY:-GK0123456789abcdef0123456789abcdef}
      STUFF_STASH_S3_SECRET_KEY: ${STUFF_STASH_S3_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      STUFF_STASH_S3_BUCKET: ${STUFF_STASH_S3_BUCKET:-stuffstash}
      STUFF_STASH_S3_REGION: ${STUFF_STASH_S3_REGION:-garage}
      STUFF_STASH_S3_SECURE: ${STUFF_STASH_S3_SECURE:-false}
      STUFF_STASH_MAX_ATTACHMENT_BYTES: ${STUFF_STASH_MAX_ATTACHMENT_BYTES:-26214400}
    ports:
      - "${STUFF_STASH_HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_started
      spicedb:
        condition: service_started
      migration:
        condition: service_completed_successfully
      garage:
        condition: service_healthy

  postgres:
    image: postgres:18.1-alpine@sha256:aa6eb304ddb6dd26df23d05db4e5cb05af8951cda3e0dc57731b771e0ef4ab29
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stuffstash}
      POSTGRES_USER: ${POSTGRES_USER:-stuffstash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stuffstash-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 2s
      timeout: 5s
      retries: 15

  spicedb:
    image: authzed/spicedb:v1.47.1@sha256:25c5499a43fdb206b7b1b72da4ba7ca911d92fd80d4d08ce2e95bf7ea0709788
    command:
      - serve-testing
    ports:
      - "${SPICEDB_GRPC_PORT:-50051}:50051"

  garage:
    image: ${GARAGE_IMAGE:-dxflrs/garage:v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690}
    command:
      - /garage
      - server
      - --single-node
      - --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${STUFF_STASH_S3_ACCESS_KEY:-GK0123456789abcdef0123456789abcdef}
      GARAGE_DEFAULT_SECRET_KEY: ${STUFF_STASH_S3_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      GARAGE_DEFAULT_BUCKET: ${STUFF_STASH_S3_BUCKET:-stuffstash}
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
    volumes:
      - ./deploy/local/garage/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    healthcheck:
      test:
        - CMD
        - /garage
        - status
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
  garage-meta:
  garage-data:
