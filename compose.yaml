services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_BUILDER_IMAGE: ${GO_BUILDER_IMAGE:-registry.access.redhat.com/hi/go:1.25.10-builder-1780418048@sha256:76978661900fd99d3a3d033d736cb9894f317240f52997210ecf0a8e93ce3716}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-registry.access.redhat.com/hi/core-runtime:2.42-1781714135@sha256:50714a55cbfb83cbaaed7f94fffdee8e818cf5b11ac2379ce0ff848513636353}
    image: stuff-stash:local
    environment:
      STUFF_STASH_HTTP_ADDR: ${STUFF_STASH_HTTP_ADDR:-:8080}
      STUFF_STASH_DATABASE_DSN: ${STUFF_STASH_DATABASE_DSN:-postgres://stuffstash:stuffstash-local@postgres:5432/stuffstash?sslmode=disable}
      STUFF_STASH_SPICEDB_ENDPOINT: ${STUFF_STASH_SPICEDB_ENDPOINT:-spicedb:50051}
      STUFF_STASH_SPICEDB_PRESHARED_KEY: ${STUFF_STASH_SPICEDB_PRESHARED_KEY:-stuffstash-local-spicedb-key}
    ports:
      - "${STUFF_STASH_HTTP_PORT:-8080}:8080"
    depends_on:
      - postgres
      - spicedb

  postgres:
    image: postgres:18.1-alpine@sha256:aa6eb304ddb6dd26df23d05db4e5cb05af8951cda3e0dc57731b771e0ef4ab29
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stuffstash}
      POSTGRES_USER: ${POSTGRES_USER:-stuffstash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stuffstash-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  spicedb:
    image: authzed/spicedb:v1.47.1@sha256:25c5499a43fdb206b7b1b72da4ba7ca911d92fd80d4d08ce2e95bf7ea0709788
    command:
      - serve-testing
      - --grpc-preshared-key
      - ${STUFF_STASH_SPICEDB_PRESHARED_KEY:-stuffstash-local-spicedb-key}
    ports:
      - "${SPICEDB_GRPC_PORT:-50051}:50051"

volumes:
  postgres-data:
