pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    go-test:
      glob: "*.go"
      run: GOCACHE="$PWD/.cache/go-build" go test ./apps/api/...
    go-structural-rules:
      glob: "*.go"
      run: scripts/check-go-structural-rules.sh {staged_files}
    go-domain-imports:
      glob: "*.go"
      run: scripts/check-go-domain-imports.sh {staged_files}
    api-client-check-generated:
      glob: "packages/api-client/**"
      run: make api-client-check-generated
    api-client-test:
      glob: "packages/api-client/**"
      run: make api-client-test api-client-check
    web-test:
      glob: "apps/web/**"
      run: make web-test web-check
    docs-build:
      glob: "docs/**"
      run: make docs-build
    dependency-age-check:
      glob: "{**/go.mod,**/go.sum,**/package.json,**/pnpm-lock.yaml}"
      run: make dependency-age-check
    scripts-test:
      glob: "scripts/{plan-release.sh,check-dependency-age.py,test-release-planner.sh}"
      run: make scripts-test
