services:
  caddy:
    image: ${CADDY_IMAGE:?set CADDY_IMAGE in .env}
    env_file:
      - .env
    ports:
      - "${STUFF_STASH_BIND_ADDRESS:?set STUFF_STASH_BIND_ADDRESS in .env}:${STUFF_STASH_WEB_PORT:?set STUFF_STASH_WEB_PORT in .env}:${STUFF_STASH_WEB_PORT:?set STUFF_STASH_WEB_PORT in .env}"
      - "${STUFF_STASH_BIND_ADDRESS:?set STUFF_STASH_BIND_ADDRESS in .env}:${STUFF_STASH_HTTP_PORT:?set STUFF_STASH_HTTP_PORT in .env}:${STUFF_STASH_HTTP_PORT:?set STUFF_STASH_HTTP_PORT in .env}"
      - "${STUFF_STASH_BIND_ADDRESS:?set STUFF_STASH_BIND_ADDRESS in .env}:${DEX_HTTP_PORT:?set DEX_HTTP_PORT in .env}:${DEX_HTTP_PORT:?set DEX_HTTP_PORT in .env}"
      - "${STUFF_STASH_BIND_ADDRESS:?set STUFF_STASH_BIND_ADDRESS in .env}:${GARAGE_S3_PORT:?set GARAGE_S3_PORT in .env}:${GARAGE_S3_PORT:?set GARAGE_S3_PORT in .env}"
    volumes:
      - ./deploy/selfhost/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - selfhost-caddy-data:/data
      - selfhost-caddy-config:/config
    networks:
      default:
        aliases:
          - ${STUFF_STASH_SELFHOST_HOSTNAME:-stuffstash.localhost}
    depends_on:
      dex:
        condition: service_healthy

  caddy-bootstrap:
    image: ${CADDY_IMAGE:?set CADDY_IMAGE in .env}
    env_file:
      - .env
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        discovery="$${STUFF_STASH_OIDC_ISSUER%/}/.well-known/openid-configuration"
        until wget --no-check-certificate -q -O /dev/null "$$discovery"; do
          sleep 1
        done
        test -s /data/caddy/pki/authorities/local/root.crt
        cat /etc/ssl/certs/ca-certificates.crt /data/caddy/pki/authorities/local/root.crt > /data/stuffstash-ca-certificates.crt
    volumes:
      - selfhost-caddy-data:/data
    depends_on:
      caddy:
        condition: service_started

  migration:
    image: ${STUFF_STASH_API_IMAGE:?set STUFF_STASH_API_IMAGE in .env}
    command:
      - migrate
      - up
    env_file:
      - .env
    environment:
      STUFF_STASH_DATABASE_DSN: postgres://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ${STUFF_STASH_API_IMAGE:?set STUFF_STASH_API_IMAGE in .env}
    env_file:
      - .env
    environment:
      STUFF_STASH_HTTP_ADDR: :8080
      STUFF_STASH_CORS_ALLOWED_ORIGINS: ${STUFF_STASH_WEB_ORIGIN:?set STUFF_STASH_WEB_ORIGIN in .env}
      STUFF_STASH_AUTH_MODE: oidc
      STUFF_STASH_INVITATION_PUBLIC_BASE_URL: ${STUFF_STASH_WEB_ORIGIN:?set STUFF_STASH_WEB_ORIGIN in .env}/invitations/accept
      STUFF_STASH_INVITATION_ALLOW_INSECURE_LOCAL_HTTP: "false"
      STUFF_STASH_AUTHZ_MODE: spicedb
      STUFF_STASH_REPOSITORY_MODE: postgres
      STUFF_STASH_BLOB_STORAGE_MODE: s3
      STUFF_STASH_DATABASE_DSN: postgres://${POSTGRES_USER:?set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB in .env}?sslmode=disable
      STUFF_STASH_OIDC_ISSUER: ${STUFF_STASH_OIDC_ISSUER:?set STUFF_STASH_OIDC_ISSUER in .env}
      STUFF_STASH_OIDC_CLIENT_ID: ${STUFF_STASH_OIDC_CLIENT_ID:?set STUFF_STASH_OIDC_CLIENT_ID in .env}
      STUFF_STASH_OIDC_CLIENT_IDS: ${STUFF_STASH_OIDC_CLIENT_IDS:?set STUFF_STASH_OIDC_CLIENT_IDS in .env}
      STUFF_STASH_SPICEDB_ENDPOINT: spicedb:50051
      STUFF_STASH_SPICEDB_PRESHARED_KEY: ${STUFF_STASH_SPICEDB_PRESHARED_KEY:?set STUFF_STASH_SPICEDB_PRESHARED_KEY in .env}
      STUFF_STASH_SPICEDB_TLS_ENABLED: "false"
      STUFF_STASH_SPICEDB_BOOTSTRAP_SCHEMA: "true"
      STUFF_STASH_SPICEDB_SCHEMA_PATH: /deploy/spicedb/schema.zed
      STUFF_STASH_S3_ENDPOINT: ${STUFF_STASH_S3_ENDPOINT:?set STUFF_STASH_S3_ENDPOINT in .env}
      STUFF_STASH_S3_PUBLIC_ENDPOINT: ${STUFF_STASH_S3_PUBLIC_ENDPOINT:?set STUFF_STASH_S3_PUBLIC_ENDPOINT in .env}
      STUFF_STASH_S3_ACCESS_KEY: ${STUFF_STASH_S3_ACCESS_KEY:?set STUFF_STASH_S3_ACCESS_KEY in .env}
      STUFF_STASH_S3_SECRET_KEY: ${STUFF_STASH_S3_SECRET_KEY:?set STUFF_STASH_S3_SECRET_KEY in .env}
      STUFF_STASH_S3_BUCKET: ${STUFF_STASH_S3_BUCKET:?set STUFF_STASH_S3_BUCKET in .env}
      STUFF_STASH_S3_REGION: ${STUFF_STASH_S3_REGION:-garage}
      STUFF_STASH_S3_SECURE: ${STUFF_STASH_S3_SECURE:-false}
      SSL_CERT_FILE: /caddy-data/stuffstash-ca-certificates.crt
    volumes:
      - selfhost-caddy-data:/caddy-data:ro
    depends_on:
      caddy-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      spicedb:
        condition: service_started
      migration:
        condition: service_completed_successfully
      garage:
        condition: service_healthy

  web:
    image: ${STUFF_STASH_WEB_IMAGE:?set STUFF_STASH_WEB_IMAGE in .env}
    env_file:
      - .env
    environment:
      STUFF_STASH_WEB_API_BASE_URL: ${STUFF_STASH_API_ORIGIN:?set STUFF_STASH_API_ORIGIN in .env}
      STUFF_STASH_WEB_OIDC_ISSUER: ${STUFF_STASH_OIDC_ISSUER:?set STUFF_STASH_OIDC_ISSUER in .env}
      STUFF_STASH_WEB_OIDC_CLIENT_ID: ${STUFF_STASH_WEB_OIDC_CLIENT_ID:?set STUFF_STASH_WEB_OIDC_CLIENT_ID in .env}
      STUFF_STASH_WEB_OIDC_REDIRECT_URI: ${STUFF_STASH_WEB_OIDC_REDIRECT_URI:?set STUFF_STASH_WEB_OIDC_REDIRECT_URI in .env}
      STUFF_STASH_WEB_MEDIA_MAX_BYTES: ${STUFF_STASH_MAX_ATTACHMENT_BYTES:-26214400}
      STUFF_STASH_WEB_INVITATION_ALLOW_INSECURE_LOCAL_HTTP: "false"
    user: "1001:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev
    depends_on:
      app:
        condition: service_started
      garage-cors:
        condition: service_completed_successfully

  dex-config-bootstrap:
    image: ${CADDY_IMAGE:?set CADDY_IMAGE in .env}
    user: "0:0"
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        cp /source/config.yaml /staged/config.yaml.tmp
        chown 1001:1001 /staged/config.yaml.tmp
        chmod 600 /staged/config.yaml.tmp
        mv /staged/config.yaml.tmp /staged/config.yaml
    volumes:
      - ${DEX_CONFIG_PATH:-./deploy/selfhost/dex/config.yaml}:/source/config.yaml:ro
      - selfhost-dex-config:/staged

  dex:
    image: ${DEX_IMAGE:-dexidp/dex:v2.44.0@sha256:5d0656fce7d453c0e3b2706abf40c0d0ce5b371fb0b73b3cf714d05f35fa5f86}
    command:
      - dex
      - serve
      - /etc/dex/config.yaml
    volumes:
      - selfhost-dex-config:/etc/dex:ro
      - ./deploy/dex/theme/styles.css:/srv/dex/web/themes/light/styles.css:ro
      - ./docs/public/brand/stuff-stash-glyph.png:/srv/dex/web/themes/light/logo.png:ro
      - ./docs/public/brand/stuff-stash-glyph.png:/srv/dex/web/themes/light/favicon.png:ro
      - ./deploy/dex/templates/header.html:/srv/dex/web/templates/header.html:ro
      - ./deploy/dex/templates/login.html:/srv/dex/web/templates/login.html:ro
      - ./deploy/dex/templates/password.html:/srv/dex/web/templates/password.html:ro
    depends_on:
      dex-config-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:5556/dex/.well-known/openid-configuration
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  postgres:
    image: ${POSTGRES_IMAGE:?set POSTGRES_IMAGE in .env}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - selfhost-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 20

  spicedb-migration:
    image: ${SPICEDB_IMAGE:?set SPICEDB_IMAGE in .env}
    command:
      - migrate
      - head
      - --datastore-engine
      - postgres
      - --datastore-conn-uri
      - postgres://${SPICEDB_POSTGRES_USER:?set SPICEDB_POSTGRES_USER in .env}:${SPICEDB_POSTGRES_PASSWORD:?set SPICEDB_POSTGRES_PASSWORD in .env}@spicedb-postgres:5432/${SPICEDB_POSTGRES_DB:?set SPICEDB_POSTGRES_DB in .env}?sslmode=disable
    depends_on:
      spicedb-postgres:
        condition: service_healthy

  spicedb:
    image: ${SPICEDB_IMAGE:?set SPICEDB_IMAGE in .env}
    command:
      - serve
      - --grpc-preshared-key
      - ${STUFF_STASH_SPICEDB_PRESHARED_KEY:?set STUFF_STASH_SPICEDB_PRESHARED_KEY in .env}
      - --datastore-engine
      - postgres
      - --datastore-conn-uri
      - postgres://${SPICEDB_POSTGRES_USER:?set SPICEDB_POSTGRES_USER in .env}:${SPICEDB_POSTGRES_PASSWORD:?set SPICEDB_POSTGRES_PASSWORD in .env}@spicedb-postgres:5432/${SPICEDB_POSTGRES_DB:?set SPICEDB_POSTGRES_DB in .env}?sslmode=disable
    depends_on:
      spicedb-migration:
        condition: service_completed_successfully

  spicedb-postgres:
    image: ${POSTGRES_IMAGE:?set POSTGRES_IMAGE in .env}
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: ${SPICEDB_POSTGRES_DB:?set SPICEDB_POSTGRES_DB in .env}
      POSTGRES_USER: ${SPICEDB_POSTGRES_USER:?set SPICEDB_POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${SPICEDB_POSTGRES_PASSWORD:?set SPICEDB_POSTGRES_PASSWORD in .env}
    volumes:
      - selfhost-spicedb-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 20

  garage:
    image: ${GARAGE_IMAGE:?set GARAGE_IMAGE in .env}
    command:
      - /garage
      - server
      - --single-node
      - --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${STUFF_STASH_S3_ACCESS_KEY:?set STUFF_STASH_S3_ACCESS_KEY in .env}
      GARAGE_DEFAULT_SECRET_KEY: ${STUFF_STASH_S3_SECRET_KEY:?set STUFF_STASH_S3_SECRET_KEY in .env}
      GARAGE_DEFAULT_BUCKET: ${STUFF_STASH_S3_BUCKET:?set STUFF_STASH_S3_BUCKET in .env}
    volumes:
      - ./deploy/selfhost/garage/garage.toml:/etc/garage.toml:ro
      - selfhost-garage-meta:/var/lib/garage/meta
      - selfhost-garage-data:/var/lib/garage/data
    healthcheck:
      test:
        - CMD
        - /garage
        - status
      interval: 5s
      timeout: 5s
      retries: 30

  garage-cors:
    image: ${NODE_BUILDER_IMAGE:?set NODE_BUILDER_IMAGE in .env}
    working_dir: /workspace
    command:
      - node
      - /workspace/scripts/configure-garage-cors.mjs
    environment:
      STUFF_STASH_GARAGE_CORS_ENDPOINT: http://garage:3900
      STUFF_STASH_WEB_ORIGIN: ${STUFF_STASH_WEB_ORIGIN:?set STUFF_STASH_WEB_ORIGIN in .env}
      STUFF_STASH_S3_ACCESS_KEY: ${STUFF_STASH_S3_ACCESS_KEY:?set STUFF_STASH_S3_ACCESS_KEY in .env}
      STUFF_STASH_S3_SECRET_KEY: ${STUFF_STASH_S3_SECRET_KEY:?set STUFF_STASH_S3_SECRET_KEY in .env}
      STUFF_STASH_S3_BUCKET: ${STUFF_STASH_S3_BUCKET:?set STUFF_STASH_S3_BUCKET in .env}
      STUFF_STASH_S3_REGION: ${STUFF_STASH_S3_REGION:-garage}
    volumes:
      - ./scripts/configure-garage-cors.mjs:/workspace/scripts/configure-garage-cors.mjs:ro
    depends_on:
      garage:
        condition: service_healthy

volumes:
  selfhost-caddy-data:
  selfhost-caddy-config:
  selfhost-dex-config:
  selfhost-postgres-data:
  selfhost-spicedb-postgres-data:
  selfhost-garage-meta:
  selfhost-garage-data:
